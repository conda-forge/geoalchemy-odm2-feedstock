{% set version = "0.7.4" %}

package:
  name: geoalchemy-odm2
  version: {{ version }}

source:
  url: https://github.com/ODM2/geoalchemy/archive/v{{ version }}.tar.gz
  sha256: fbbfb448f601037c9bc15c5314047cd049a1c2dd5659d6078c6ef3ba1cc8508e

build:
  noarch: python
  number: 2
  script: {{ PYTHON }} -m pip install . -vv --no-deps --no-build-isolation

requirements:
  host:
    - python {{ python_min }}
    - setuptools
    - pip
    - sqlalchemy >=0.6.1
    - six
  run:
    - python >={{ python_min }}
    - sqlalchemy >=0.6.1
    - six

test:
  requires:
    - python {{ python_min }}
  imports:
    - geoalchemy
    - geoalchemy.tests

about:
  home: http://geoalchemy.org/
  license: MIT
  summary: 'Using SQLAlchemy with Spatial Databases. (This is a ODM2 fork and not the original geoalchemy!)'

extra:
  recipe-maintainers:
    - emiliom
    - lsetiawan
    - ocefpaf
